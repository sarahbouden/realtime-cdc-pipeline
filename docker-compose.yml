# =============================================================================
# docker-compose.yml — Phase 3: Adding Apache Flink
# Services: postgres, zookeeper, kafka, schema-registry, debezium,
#           simulator, flink-jobmanager, flink-taskmanager
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Source Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cdc_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "log_replication_commands=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ZooKeeper — Kafka Coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cdc_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/ruok | grep ruok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Broker — Event Streaming Backbone
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cdc_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Schema Registry — Centralized Schema Management
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: cdc_schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Debezium — CDC Connector (Kafka Connect)
  # ---------------------------------------------------------------------------
  debezium:
    image: debezium/connect:2.6
    container_name: cdc_debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flink JobManager — Cluster Coordinator
  # Receives job submissions, plans execution, coordinates TaskManagers.
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: cdc_flink_jobmanager
    # Fix warehouse permissions at container startup, then start jobmanager.
    # The chmod is needed because Docker mounts the host volume AFTER the
    # Dockerfile RUN commands execute — so build-time permissions are overridden
    # by the mount. We reapply them here at runtime as root before switching user.
    entrypoint: >
      /bin/bash -c "
        chmod -R 777 /warehouse &&
        /docker-entrypoint.sh jobmanager
      "
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-port: 8081
        state.backend: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WAREHOUSE_PATH: /warehouse
    volumes:
      - ./warehouse:/warehouse
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flink TaskManager — Worker Node
  # ---------------------------------------------------------------------------
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: cdc_flink_taskmanager
    entrypoint: >
      /bin/bash -c "
        chmod -R 777 /warehouse &&
        /docker-entrypoint.sh taskmanager
      "
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WAREHOUSE_PATH: /warehouse
    volumes:
      - ./warehouse:/warehouse
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    restart: unless-stopped


  # ---------------------------------------------------------------------------
  # dbt — Analytical Transformations on DuckDB
  # Reads JSON files written by Flink, runs SQL models every 60 seconds,
  # and materializes clean analytical tables in DuckDB.
  # ---------------------------------------------------------------------------
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    container_name: cdc_dbt
    volumes:
      - ./warehouse:/warehouse
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Simulator — Continuous Data Generator
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: cdc_simulator
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST}
      POSTGRES_PORT:     ${POSTGRES_PORT}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SIMULATOR_ORDERS_PER_CYCLE: ${SIMULATOR_ORDERS_PER_CYCLE}
      SIMULATOR_CYCLE_SECONDS:    ${SIMULATOR_CYCLE_SECONDS}
      SIMULATOR_SEED_CUSTOMERS:   ${SIMULATOR_SEED_CUSTOMERS}
      SIMULATOR_SEED_PRODUCTS:    ${SIMULATOR_SEED_PRODUCTS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  # ---------------------------------------------------------------------------
  # Airflow — Pipeline Orchestration
  # Schedules and monitors dbt runs every 5 minutes.
  # Uses LocalExecutor (single-process) — sufficient for local dev.
  # In production you'd use CeleryExecutor or KubernetesExecutor.
  # ---------------------------------------------------------------------------
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: cdc_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      # SequentialExecutor is the only executor compatible with SQLite.
      # LocalExecutor requires PostgreSQL — Airflow 2.9 changed the default
      # to LocalExecutor which broke SQLite-based setups.
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////home/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "cdc-pipeline-local-dev"
      AIRFLOW__CORE__DAGS_FOLDER: /dags
    volumes:
      - ./airflow/dags:/dags
      - ./dbt:/dbt
      - ./warehouse:/warehouse
    ports:
      - "8080:8080"
    command:
      - bash
      - -c
      - "exec airflow standalone" 
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards and Visualization
  # Connects to DuckDB and renders live business KPI dashboards.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # API — Lightweight REST API exposing DuckDB metrics for Grafana
  # Implements the SimpleJSON protocol so Grafana can query DuckDB directly.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cdc_api
    environment:
      DUCKDB_PATH: /warehouse/ecommerce.duckdb
      API_PORT: "3001"
    volumes:
      - ./warehouse:/warehouse
    ports:
      - "3001:3001"
    depends_on:
      - dbt
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cdc_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafana-admin-2026
      GF_INSTALL_PLUGINS: simpod-json-datasource
      # simpod-json-datasource is a stable, widely-used Grafana plugin that
      # queries any REST API following the SimpleJSON protocol.
      # Our lightweight Python API (api/ service) implements this protocol.
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./warehouse:/warehouse
      - grafana_data:/var/lib/grafana
    depends_on:
      - dbt
      - api
    restart: unless-stopped


# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local