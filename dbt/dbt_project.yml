# =============================================================================
# dbt_project.yml — Project configuration
# =============================================================================

name: ecommerce_pipeline
version: "1.0.0"
config-version: 2

profile: ecommerce_pipeline

model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
macro-paths:    ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_pipeline:
    staging:
      +materialized: table
      # No +schema here — schema is set once in profiles.yml.
      # Setting it in both places causes dbt to concatenate them (main_main).
    marts:
      +materialized: table